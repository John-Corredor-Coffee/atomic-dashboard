<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic — Software Ecosystem</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f5;
    --surface: #ffffff;
    --border: #e0ddd8;
    --text: #1a1a1a;
    --text-muted: #6b6560;
    --accent: #c47a2e;
    --danger: #c0392b;
    --success: #2e8c5a;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; }
  header span { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .spacer { flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px; border-radius: var(--radius);
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #b36a20; }
  .btn.success { background: var(--success); color: #fff; border-color: var(--success); }
  .btn.success:hover { background: #237049; }
  .btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn.danger:hover { background: #a93226; }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 10px 6px; font-size: 11.5px; font-weight: 600;
    text-align: center; cursor: pointer; border: none; background: none;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 14px; flex-direction: column; gap: 10px; }
  .tab-panel.active { display: flex; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px; color: var(--text); background: var(--surface);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); }

  /* Category list */
  .cat-list { display: flex; flex-direction: column; gap: 6px; }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer; transition: background 0.12s;
  }
  .cat-item:hover { background: var(--bg); }
  .cat-item.selected { border-color: var(--accent); background: #fdf5eb; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 13px; flex: 1; }
  .cat-count { font-size: 11px; color: var(--text-muted); }
  .cat-delete { font-size: 14px; color: var(--text-muted); padding: 2px 4px; border-radius: 4px; cursor: pointer; line-height: 1; }
  .cat-delete:hover { color: var(--danger); background: #fdecea; }

  /* Node list */
  .node-list { display: flex; flex-direction: column; gap: 4px; }
  .node-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer; transition: background 0.12s;
  }
  .node-item:hover { background: var(--bg); }
  .node-label { font-size: 12px; flex: 1; }
  .node-cat-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    color: #fff; font-weight: 600; white-space: nowrap;
  }
  .node-delete { font-size: 13px; color: var(--text-muted); padding: 2px 4px; border-radius: 4px; cursor: pointer; line-height: 1; }
  .node-delete:hover { color: var(--danger); background: #fdecea; }

  /* ── Version history list ── */
  .version-list { display: flex; flex-direction: column; gap: 8px; }
  .version-empty { font-size: 12px; color: var(--text-muted); text-align: center; padding: 24px 0; line-height: 1.6; }
  .version-item {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; background: var(--surface); transition: border-color 0.15s;
  }
  .version-item:hover { border-color: var(--accent); }
  .version-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .version-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .version-actions { display: flex; gap: 6px; }
  .version-btn {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); transition: background 0.12s;
  }
  .version-btn:hover { background: #ece9e4; }
  .version-btn.restore { background: #edf7f2; border-color: #b0d9c0; color: var(--success); }
  .version-btn.restore:hover { background: #d8f0e4; }
  .version-btn.del { background: #fdecea; border-color: #f0b9b5; color: var(--danger); }
  .version-btn.del:hover { background: #f9d5d3; }
  .version-diff { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ── Canvas ── */
  .canvas-wrap {
    flex: 1; overflow: hidden; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg); position: relative;
  }
  #tree-svg { width: 100%; height: 100%; }
  .link { fill: none; stroke: #ccc; stroke-width: 1.4; }
  .node-circle { stroke-width: 1.5; cursor: pointer; }
  .node-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .node-text.root { font-weight: 700; font-size: 13px; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
  .node-text.branch { font-weight: 600; font-size: 12px; }
  .node-text.leaf { font-size: 10.5px; fill: #555; }

  /* ── Tooltip ── */
  .tooltip {
    position: absolute; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; font-size: 12px;
    box-shadow: var(--shadow); pointer-events: none; opacity: 0;
    transition: opacity 0.15s; white-space: nowrap; z-index: 100;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 12px;
    padding: 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #1a1a1a; color: #fff; padding: 8px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 300;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint-bar {
    position: absolute; bottom: 12px; right: 16px;
    font-size: 11px; color: var(--text-muted); pointer-events: none;
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>Atomic — Software Ecosystem</h1>
  <span id="node-count"></span>
  <div class="spacer"></div>
  <button class="btn" onclick="exportJSON()">⬇ Export</button>
  <button class="btn" onclick="importClick()">⬆ Import</button>
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="btn success" onclick="openSaveVersion()">💾 Save Version</button>
  <button class="btn primary" onclick="openAddCategory()">＋ Category</button>
  <button class="btn primary" onclick="openAddNode()">＋ Node</button>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('categories', this)">Categories</button>
      <button class="tab-btn" onclick="switchTab('nodes', this)">Nodes</button>
      <button class="tab-btn" onclick="switchTab('history', this)">History</button>
    </div>

    <div class="tab-panel active" id="tab-categories">
      <div class="cat-list" id="cat-list"></div>
    </div>

    <div class="tab-panel" id="tab-nodes">
      <div class="field">
        <input type="text" id="node-search" placeholder="Search nodes…" oninput="renderNodeList()">
      </div>
      <div class="node-list" id="node-list"></div>
    </div>

    <div class="tab-panel" id="tab-history">
      <div class="version-list" id="version-list"></div>
    </div>
  </div>

  <!-- Chart -->
  <div class="canvas-wrap" id="canvas-wrap">
    <svg id="tree-svg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="hint-bar">Scroll to zoom · Drag to pan · Click node to edit</div>
  </div>
</div>

<!-- Add/Edit Category Modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <h2 id="cat-modal-title">Add Category</h2>
    <div class="field">
      <label>Category Name</label>
      <input type="text" id="cat-name-input" placeholder="e.g. Analytics">
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-row" id="color-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('cat-modal')">Cancel</button>
      <button class="btn primary" id="cat-modal-save" onclick="saveCategory()">Add</button>
    </div>
  </div>
</div>

<!-- Add/Edit Node Modal -->
<div class="modal-overlay" id="node-modal">
  <div class="modal">
    <h2 id="node-modal-title">Add Node</h2>
    <div class="field">
      <label>Node Label</label>
      <input type="text" id="node-label-input" placeholder="e.g. Order Tracking">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="node-cat-select"></select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('node-modal')">Cancel</button>
      <button class="btn primary" id="node-modal-save" onclick="saveNode()">Add</button>
    </div>
  </div>
</div>

<!-- Save Version Modal -->
<div class="modal-overlay" id="version-modal">
  <div class="modal">
    <h2>Save Version</h2>
    <div class="field">
      <label>Version Name</label>
      <input type="text" id="version-name-input" placeholder="e.g. Q3 2026 baseline">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="version-notes-input" placeholder="What changed?">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('version-modal')">Cancel</button>
      <button class="btn success" onclick="confirmSaveVersion()">Save</button>
    </div>
  </div>
</div>

<!-- Restore Confirm Modal -->
<div class="modal-overlay" id="restore-modal">
  <div class="modal">
    <h2>Restore Version</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.5">
      This will replace your current diagram with the saved version.<br>
      Your current state will be auto-saved as <b>"Before restore"</b> first.
    </p>
    <div id="restore-preview" style="font-size:12px;background:var(--bg);border-radius:var(--radius);padding:10px 12px;margin-bottom:4px;color:var(--text-muted)"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('restore-modal')">Cancel</button>
      <button class="btn success" onclick="confirmRestore()">Restore</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

const PALETTE = [
  "#c47a2e","#3d7abf","#2e8c5a","#7b5ea7","#b05252","#4a8fa8",
  "#e07b3f","#5a9e6f","#8c6db5","#3a7a6a","#c0394b","#6b7fc4",
  "#a0733a","#5b9fd4","#e0a030","#687a3a"
];

const MAX_VERSIONS = 30;
const STORAGE_KEY  = "atomic-ecosystem";
const HISTORY_KEY  = "atomic-ecosystem-history";

let selectedColor  = PALETTE[0];
let editingCatId   = null;
let editingNodeId  = null;
let selectedCatId  = null;
let pendingRestoreId = null;

let state = loadState() || {
  categories: [
    { id: "commerce", name: "Shopify",              color: "#c47a2e" },
    { id: "crm",      name: "HubSpot",              color: "#3d7abf" },
    { id: "gws",      name: "Google Workspace",     color: "#2e8c5a" },
    { id: "tools",    name: "GitHub Pages / Tools", color: "#7b5ea7" },
    { id: "ops",      name: "Ops / Logistics",      color: "#b05252" },
    { id: "ai",       name: "Claude / AI",          color: "#4a8fa8" }
  ],
  nodes: [
    { id:"n1",  label:"Wholesale Store",      cat:"commerce" },
    { id:"n2",  label:"B2B Portal",           cat:"commerce" },
    { id:"n3",  label:"Products & Inventory", cat:"commerce" },
    { id:"n4",  label:"Orders",               cat:"commerce" },
    { id:"n5",  label:"Analytics",            cat:"commerce" },
    { id:"n6",  label:"Discounts",            cat:"commerce" },
    { id:"n7",  label:"Support Tickets",      cat:"crm" },
    { id:"n8",  label:"CRM Contacts",         cat:"crm" },
    { id:"n9",  label:"Companies",            cat:"crm" },
    { id:"n10", label:"Campaigns",            cat:"crm" },
    { id:"n11", label:"Gmail",                cat:"gws" },
    { id:"n12", label:"Sheets",               cat:"gws" },
    { id:"n13", label:"Drive",                cat:"gws" },
    { id:"n14", label:"Docs",                 cat:"gws" },
    { id:"n15", label:"Calendar",             cat:"gws" },
    { id:"n16", label:"PAR Ordering",         cat:"tools" },
    { id:"n17", label:"COGS Calculator",      cat:"tools" },
    { id:"n18", label:"Wholesale Map",        cat:"tools" },
    { id:"n19", label:"Training Form",        cat:"tools" },
    { id:"n20", label:"Dashboard",            cat:"tools" },
    { id:"n21", label:"Calendly",             cat:"ops" },
    { id:"n22", label:"Training Requests",    cat:"ops" },
    { id:"n23", label:"Order Cutoffs",        cat:"ops" },
    { id:"n24", label:"UPS Ground",           cat:"ops" },
    { id:"n25", label:"Mapline",              cat:"ops" },
    { id:"n26", label:"Skills / Workflows",   cat:"ai" },
    { id:"n27", label:"Ticket Drafting",      cat:"ai" },
    { id:"n28", label:"Shopify Upload",       cat:"ai" },
    { id:"n29", label:"Singletrack Update",   cat:"ai" },
    { id:"n30", label:"Report Generation",    cat:"ai" }
  ]
};

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
}
function saveHistory(h) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}
function uid() { return "id" + Math.random().toString(36).slice(2, 9); }
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
    + " · " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

// ── Version history ───────────────────────────────────────────────────────────

function openSaveVersion() {
  document.getElementById("version-name-input").value = "";
  document.getElementById("version-notes-input").value = "";
  openModal("version-modal");
  setTimeout(() => document.getElementById("version-name-input").focus(), 50);
}

function confirmSaveVersion() {
  const name  = document.getElementById("version-name-input").value.trim();
  const notes = document.getElementById("version-notes-input").value.trim();
  if (!name) { shake("version-name-input"); return; }
  pushVersion(name, notes);
  closeModal("version-modal");
  toast("Version saved");
  renderVersionList();
}

function pushVersion(name, notes, snapshot) {
  const h = loadHistory();
  h.unshift({
    id: uid(),
    name,
    notes: notes || "",
    savedAt: new Date().toISOString(),
    cats: (snapshot || state).categories.length,
    nodes: (snapshot || state).nodes.length,
    state: JSON.parse(JSON.stringify(snapshot || state))
  });
  if (h.length > MAX_VERSIONS) h.length = MAX_VERSIONS;
  saveHistory(h);
}

function renderVersionList() {
  const h  = loadHistory();
  const el = document.getElementById("version-list");
  el.innerHTML = "";

  if (!h.length) {
    el.innerHTML = `<div class="version-empty">No saved versions yet.<br>Click <b>💾 Save Version</b> to snapshot<br>the current diagram.</div>`;
    return;
  }

  h.forEach(v => {
    const div = document.createElement("div");
    div.className = "version-item";
    div.innerHTML = `
      <div class="version-name">${v.name}</div>
      <div class="version-meta">${fmtDate(v.savedAt)}</div>
      ${v.notes ? `<div class="version-diff">${v.notes}</div>` : ""}
      <div class="version-diff">${v.cats} categories · ${v.nodes} nodes</div>
      <div class="version-actions" style="margin-top:8px">
        <button class="version-btn restore" onclick="openRestore('${v.id}')">↩ Restore</button>
        <button class="version-btn" onclick="exportVersion('${v.id}')">⬇ Export</button>
        <button class="version-btn del" onclick="deleteVersion('${v.id}')">✕</button>
      </div>
    `;
    el.appendChild(div);
  });
}

function openRestore(id) {
  const h = loadHistory();
  const v = h.find(x => x.id === id);
  if (!v) return;
  pendingRestoreId = id;
  document.getElementById("restore-preview").textContent =
    `Restoring: "${v.name}" — ${fmtDate(v.savedAt)}`;
  openModal("restore-modal");
}

function confirmRestore() {
  const h = loadHistory();
  const v = h.find(x => x.id === pendingRestoreId);
  if (!v) return;
  pushVersion("Before restore", `Auto-saved before restoring "${v.name}"`);
  state = JSON.parse(JSON.stringify(v.state));
  closeModal("restore-modal");
  persist();
  renderVersionList();
  toast(`Restored "${v.name}"`);
}

function deleteVersion(id) {
  const h = loadHistory();
  const v = h.find(x => x.id === id);
  if (!v || !confirm(`Delete saved version "${v.name}"?`)) return;
  saveHistory(h.filter(x => x.id !== id));
  renderVersionList();
  toast("Version deleted");
}

function exportVersion(id) {
  const h = loadHistory();
  const v = h.find(x => x.id === id);
  if (!v) return;
  const blob = new Blob([JSON.stringify(v.state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `atomic-ecosystem-${v.name.replace(/\s+/g,"-").toLowerCase()}.json`;
  a.click();
}

// ── Tree rendering ────────────────────────────────────────────────────────────

let svgEl, gMain;
const margin = 80;

function buildTreeData() {
  return {
    name: "Atomic",
    children: state.categories.map(cat => ({
      id: cat.id, name: cat.name, color: cat.color, category: cat.id,
      children: state.nodes
        .filter(n => n.cat === cat.id)
        .map(n => ({ id: n.id, name: n.label, color: cat.color, category: cat.id, isLeaf: true }))
    }))
  };
}

function renderTree() {
  const wrap = document.getElementById("canvas-wrap");
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const R = Math.min(W, H) / 2 - margin;

  d3.select("#tree-svg").selectAll("*").remove();
  svgEl = d3.select("#tree-svg").attr("viewBox", `0 0 ${W} ${H}`);

  const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => gMain.attr("transform", e.transform));
  svgEl.call(zoom);

  gMain = svgEl.append("g").attr("transform", `translate(${W/2},${H/2})`);

  const treeData = buildTreeData();
  if (!treeData.children.length) return;

  const tree = d3.tree()
    .size([2 * Math.PI, R])
    .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);

  const root = tree(d3.hierarchy(treeData));

  gMain.append("g")
    .selectAll("path").data(root.links()).join("path")
    .attr("class", "link")
    .attr("d", d3.linkRadial().angle(d => d.x).radius(d => d.y));

  const node = gMain.append("g")
    .selectAll("g").data(root.descendants()).join("g")
    .attr("class", "node-g")
    .attr("transform", d =>
      d.depth === 0 ? "translate(0,0)"
        : `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`)
    .on("click", (event, d) => {
      event.stopPropagation();
      if (d.depth === 1) openEditCategory(d.data.id);
      if (d.depth === 2) openEditNode(d.data.id);
    })
    .on("mouseover", (event, d) => {
      if (d.depth === 0) return;
      const tip = document.getElementById("tooltip");
      tip.style.opacity = "1";
      tip.innerHTML = d.depth === 1
        ? `<b>${d.data.name}</b> — ${d.children?.length || 0} nodes · <i>click to edit</i>`
        : `${d.data.name} <span style="color:#999">· click to edit</span>`;
    })
    .on("mousemove", event => {
      const tip  = document.getElementById("tooltip");
      const wrap = document.getElementById("canvas-wrap").getBoundingClientRect();
      tip.style.left = (event.clientX - wrap.left + 12) + "px";
      tip.style.top  = (event.clientY - wrap.top  + 12) + "px";
    })
    .on("mouseout", () => { document.getElementById("tooltip").style.opacity = "0"; });

  node.append("circle")
    .attr("class", "node-circle")
    .attr("r", d => d.depth === 0 ? 24 : d.depth === 1 ? 8 : 4.5)
    .attr("fill", d => {
      if (d.depth === 0) return "#1a1a1a";
      const cat = state.categories.find(c => c.id === d.data.category);
      return cat ? cat.color : "#aaa";
    })
    .attr("stroke", d => {
      if (d.depth === 0) return "#fff";
      const cat = state.categories.find(c => c.id === d.data.category);
      if (!cat) return "#888";
      return d3.color(cat.color).darker(0.5);
    });

  node.filter(d => d.depth === 0).append("text").attr("class", "node-text root").text("Atomic");

  node.filter(d => d.depth === 1).append("text")
    .attr("class", "node-text branch")
    .attr("dy", "0.31em")
    .attr("x", d => d.x < Math.PI ? 14 : -14)
    .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
    .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
    .style("fill", d => { const cat = state.categories.find(c => c.id === d.data.id); return cat ? cat.color : "#333"; })
    .text(d => d.data.name);

  node.filter(d => d.depth === 2).append("text")
    .attr("class", "node-text leaf")
    .attr("dy", "0.31em")
    .attr("x", d => d.x < Math.PI ? 9 : -9)
    .attr("text-anchor", d => d.x < Math.PI ? "start" : "end")
    .attr("transform", d => d.x >= Math.PI ? "rotate(180)" : null)
    .text(d => d.data.name);

  document.getElementById("node-count").textContent =
    `${state.categories.length} categories · ${state.nodes.length} nodes`;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────

function renderCatList() {
  const el = document.getElementById("cat-list");
  el.innerHTML = "";
  state.categories.forEach(cat => {
    const count = state.nodes.filter(n => n.cat === cat.id).length;
    const div = document.createElement("div");
    div.className = "cat-item" + (selectedCatId === cat.id ? " selected" : "");
    div.onclick = () => { selectedCatId = cat.id; renderCatList(); renderNodeList(); };
    div.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-name">${cat.name}</span>
      <span class="cat-count">${count}</span>
      <span class="cat-delete" title="Delete" onclick="event.stopPropagation();deleteCategory('${cat.id}')">✕</span>
    `;
    el.appendChild(div);
  });
}

function renderNodeList() {
  const query = document.getElementById("node-search").value.toLowerCase();
  const el = document.getElementById("node-list");
  el.innerHTML = "";
  state.nodes
    .filter(n => !query || n.label.toLowerCase().includes(query))
    .forEach(n => {
      const cat = state.categories.find(c => c.id === n.cat);
      const div = document.createElement("div");
      div.className = "node-item";
      div.onclick = () => openEditNode(n.id);
      div.innerHTML = `
        <span class="node-label">${n.label}</span>
        ${cat ? `<span class="node-cat-badge" style="background:${cat.color}">${cat.name}</span>` : ""}
        <span class="node-delete" title="Delete" onclick="event.stopPropagation();deleteNode('${n.id}')">✕</span>
      `;
      el.appendChild(div);
    });
}

function switchTab(name, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
  if (name === "history") renderVersionList();
}

// ── Color swatches ────────────────────────────────────────────────────────────

function buildSwatches(containerId, currentColor) {
  selectedColor = currentColor || PALETTE[0];
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  PALETTE.forEach(c => {
    const s = document.createElement("div");
    s.className = "color-swatch" + (c === selectedColor ? " selected" : "");
    s.style.background = c;
    s.onclick = () => {
      selectedColor = c;
      container.querySelectorAll(".color-swatch").forEach(sw => sw.classList.remove("selected"));
      s.classList.add("selected");
    };
    container.appendChild(s);
  });
}

// ── Category CRUD ─────────────────────────────────────────────────────────────

function openAddCategory() {
  editingCatId = null;
  document.getElementById("cat-modal-title").textContent = "Add Category";
  document.getElementById("cat-modal-save").textContent = "Add";
  document.getElementById("cat-name-input").value = "";
  buildSwatches("color-swatches", PALETTE[Math.floor(Math.random() * PALETTE.length)]);
  openModal("cat-modal");
  setTimeout(() => document.getElementById("cat-name-input").focus(), 50);
}

function openEditCategory(id) {
  const cat = state.categories.find(c => c.id === id);
  if (!cat) return;
  editingCatId = id;
  document.getElementById("cat-modal-title").textContent = "Edit Category";
  document.getElementById("cat-modal-save").textContent = "Save";
  document.getElementById("cat-name-input").value = cat.name;
  buildSwatches("color-swatches", cat.color);
  openModal("cat-modal");
  setTimeout(() => document.getElementById("cat-name-input").focus(), 50);
}

function saveCategory() {
  const name = document.getElementById("cat-name-input").value.trim();
  if (!name) { shake("cat-name-input"); return; }
  if (editingCatId) {
    const cat = state.categories.find(c => c.id === editingCatId);
    cat.name = name; cat.color = selectedColor;
    toast("Category updated");
  } else {
    state.categories.push({ id: uid(), name, color: selectedColor });
    toast("Category added");
  }
  closeModal("cat-modal");
  persist();
}

function deleteCategory(id) {
  const cat = state.categories.find(c => c.id === id);
  if (!confirm(`Delete "${cat.name}" and all its nodes?`)) return;
  state.categories = state.categories.filter(c => c.id !== id);
  state.nodes      = state.nodes.filter(n => n.cat !== id);
  if (selectedCatId === id) selectedCatId = null;
  toast("Category deleted");
  persist();
}

// ── Node CRUD ─────────────────────────────────────────────────────────────────

function openAddNode() {
  editingNodeId = null;
  document.getElementById("node-modal-title").textContent = "Add Node";
  document.getElementById("node-modal-save").textContent = "Add";
  document.getElementById("node-label-input").value = "";
  populateCatSelect(selectedCatId);
  openModal("node-modal");
  setTimeout(() => document.getElementById("node-label-input").focus(), 50);
}

function openEditNode(id) {
  const n = state.nodes.find(x => x.id === id);
  if (!n) return;
  editingNodeId = id;
  document.getElementById("node-modal-title").textContent = "Edit Node";
  document.getElementById("node-modal-save").textContent = "Save";
  document.getElementById("node-label-input").value = n.label;
  populateCatSelect(n.cat);
  openModal("node-modal");
  setTimeout(() => document.getElementById("node-label-input").focus(), 50);
}

function populateCatSelect(selectedId) {
  const sel = document.getElementById("node-cat-select");
  sel.innerHTML = "";
  state.categories.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat.id; opt.textContent = cat.name;
    if (cat.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveNode() {
  const label = document.getElementById("node-label-input").value.trim();
  const cat   = document.getElementById("node-cat-select").value;
  if (!label) { shake("node-label-input"); return; }
  if (editingNodeId) {
    const n = state.nodes.find(x => x.id === editingNodeId);
    n.label = label; n.cat = cat;
    toast("Node updated");
  } else {
    state.nodes.push({ id: uid(), label, cat });
    toast("Node added");
  }
  closeModal("node-modal");
  persist();
}

function deleteNode(id) {
  state.nodes = state.nodes.filter(n => n.id !== id);
  toast("Node removed");
  persist();
}

// ── Modal helpers ─────────────────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

document.querySelectorAll(".modal-overlay").forEach(el => {
  el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); });
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.querySelectorAll(".modal-overlay.open").forEach(m => m.classList.remove("open"));
});

// ── Import / Export ───────────────────────────────────────────────────────────

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "atomic-ecosystem.json";
  a.click();
  toast("Exported!");
}

function importClick() { document.getElementById("import-input").click(); }

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.categories || !parsed.nodes) throw new Error();
      pushVersion("Before import", "Auto-saved before JSON import");
      state = parsed;
      persist();
      renderVersionList();
      toast("Imported successfully");
    } catch { alert("Invalid JSON file. Expected {categories, nodes} format."); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function persist() {
  saveState();
  renderTree();
  renderCatList();
  renderNodeList();
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = "#c0392b";
  setTimeout(() => el.style.borderColor = "", 600);
}

// ── Init ──────────────────────────────────────────────────────────────────────

window.addEventListener("resize", renderTree);
renderTree();
renderCatList();
renderNodeList();
</script>
</body>
</html>
